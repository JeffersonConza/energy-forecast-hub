version: '3.8'

services:
  python_api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: energy_python_api
    ports:
      - "8000:8000"
    restart: always

  r_api:
    build:
      context: .
      dockerfile: Dockerfile.r
    container_name: energy_r_api
    ports:
      - "8001:8001"
    restart: always

  julia_api:
    build:
      context: .
      dockerfile: Dockerfile.julia
    container_name: energy_julia_api
    ports:
      - "8002:8002"
    restart: always

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: energy_dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHON_API_URL=http://python_api:8000
      - R_API_URL=http://r_api:8001
      - JULIA_API_URL=http://julia_api:8002
    depends_on:
      - python_api
      - r_api
      - julia_api
    restart: always